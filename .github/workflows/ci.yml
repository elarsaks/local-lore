name: LocalLore checks

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  retrieval-evals:
    name: Deterministic retrieval evals
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --locked --dev
      - name: Run offline keyword retrieval evals
        run: uv run pytest -q tests/test_retrieval_evals.py

  evaluation-contract:
    name: Evaluation contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --locked --dev

      - name: Verify evaluation contract
        run: uv run pytest -q tests/test_evaluation_contract.py

  session-ingestion:
    name: Session ingestion
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --locked --dev
      - name: Verify message parsing and session refresh
        run: uv run pytest -q tests/test_message_parsing.py tests/test_session_ingestion.py

  plugin-runtime:
    name: Plugin runtime
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install locked development dependencies
        run: uv sync --locked --dev
      - name: Verify plugin runtime
        run: uv run pytest -q tests/test_plugin_runtime.py

      - name: Validate plugin manifest
        run: |
          uv run python -m json.tool .claude-plugin/plugin.json >/dev/null
          uv run python -c '
          import json
          from pathlib import Path
          manifest = json.loads(Path(".claude-plugin/plugin.json").read_text())
          assert manifest["name"] == "locallore"
          assert manifest["version"] == "0.1.0"
          assert manifest["author"]["name"] == "Elar Saks"
          '

      - name: Validate Compose configuration
        env:
          CLAUDE_PROJECTS_DIR: /tmp
        run: docker compose config --quiet

  offline-image:
    name: Offline image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build offline runtime image
        run: docker build --tag locallore-ci .
